<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – Favourite Books</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
    }

    header {
      background: #111;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-family: 'Merriweather', serif;
      font-size: 1.2rem;
      color: #fff;
      font-weight: 700;
    }
    header a {
      color: #fff;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
    }
    header a:hover { text-decoration: underline; }

    .page-wrap {
      max-width: 480px;
      margin: 48px auto;
      padding: 0 16px;
    }

    h2 {
      font-family: 'Merriweather', serif;
      font-size: 1.5rem;
      margin-bottom: 6px;
    }
    .sub {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }
    .sub a { color: #cc0000; text-decoration: none; }
    .sub a:hover { text-decoration: underline; }

    /* Error / success banner */
    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.88rem;
      margin-bottom: 20px;
    }
    .alert-error   { background: #fdecea; border: 1px solid #f5c6cb; color: #a02020; }
    .alert-success { background: #e6f4ea; border: 1px solid #b7dfbb; color: #2d7a3a; }

    /* Form card */
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 28px 28px 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      border-top: 3px solid #cc0000;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #444;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="password"] {
      padding: 5px 3px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: border-color 0.18s;
    }
    input:focus {
      border-color: #cc0000;
      background: #fff;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 6px;
    }
    .btn:hover { background: #aa0000; }
  </style>
</head>
<body>

<header>
  <h1>🏪 Favourite Books</h1>
  <a href="/">Back to catalogue</a>
</header>

<div class="page-wrap">

  <h2>Create an account</h2>
  <p class="sub">Already have one? <a href="/login">Sign in here</a></p>

  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <div class="card">
    <!-- Sends the new customer details to be validated and saved -->
    <form method="POST" action="/register">

      <div class="row">
        <div class="field">
          <label for="first_name">First name</label>
          <input type="text" id="first_name" name="first_name" placeholder="Jane"
                 value="{{ form.first_name }}" required>
        </div>
        <div class="field">
          <label for="last_name">Last name</label>
          <input type="text" id="last_name" name="last_name" placeholder="Doe"
                 value="{{ form.last_name }}" required>
        </div>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com"
               value="{{ form.email }}" required>
      </div>

      <div class="field">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" placeholder="+61 4XX XXX XXX"
               value="{{ form.phone }}" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="At least 6 characters" required>
      </div>

      <div class="field">
        <label for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password"
               placeholder="Re-enter password" required>
      </div>

      <button type="submit" class="btn">Create Account</button>

    </form>
  </div>

</div>

</body>
</html>
