<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account – The Book Haven</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
    }

    header {
      background: #111;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-family: 'Merriweather', serif;
      font-size: 1.2rem;
      color: #fff;
      font-weight: 700;
    }
    header a {
      color: #fff;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
    }
    header a:hover { text-decoration: underline; }

    .page-wrap {
      max-width: 480px;
      margin: 48px auto;
      padding: 0 16px;
    }

    h2 {
      font-family: 'Merriweather', serif;
      font-size: 1.4rem;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.1);
      border-top: 3px solid #cc0000;
      margin-bottom: 16px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.9rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .lbl { color: #888; font-weight: 500; }
    .detail-row .val { font-weight: 600; color: #111; }

    .btn-logout {
      display: inline-block;
      padding: 10px 24px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      color: #666;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: #cc0000; color: #cc0000; }
  </style>
</head>
<body>

<header>
  <h1>🏪 The Book Haven</h1>
  <a href="/">Back to catalogue</a>
</header>

<div class="page-wrap">

  <h2>My Account</h2>

  <!-- Shows the saved customer details from the current session -->
  <div class="card">
    <div class="detail-row">
      <span class="lbl">Name</span>
      <span class="val">{{ customer.first_name }} {{ customer.last_name }}</span>
    </div>
    <div class="detail-row">
      <span class="lbl">Email</span>
      <span class="val">{{ customer.email }}</span>
    </div>
    <div class="detail-row">
      <span class="lbl">Phone</span>
      <span class="val">{{ customer.phone }}</span>
    </div>
  </div>

  <a href="/logout" class="btn-logout">Sign out</a>

</div>

</body>
</html>
