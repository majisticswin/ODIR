<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Favourite Books – Catalogue</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: #111;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
    }
    header h1 {
      font-family: 'Merriweather', serif;
      font-size: 1.2rem;
      color: #fff;
      font-weight: 700;
    }

    /* Hero */
    .hero {
      background: #cc0000;
      padding: 48px 32px 56px;
      text-align: center;
      border-bottom: 4px solid #111;
    }
    .hero h2 {
      font-family: 'Merriweather', serif;
      font-size: 2rem;
      color: #fff;
      margin-bottom: 8px;
    }
    .hero p {
      color: #ffc0c0;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    /* Search */
    .search-row {
      display: flex;
      justify-content: center;
      max-width: 560px;
      margin: 0 auto 16px;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .search-row input {
      flex: 1;
      padding: 13px 18px;
      font-size: 1rem;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
    }
    .search-row button {
      padding: 13px 22px;
      background: #111;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      transition: background 0.2s;
    }
    .search-row button:hover { background: #333; }

    /* Filter row */
    .filter-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-row select {
      padding: 8px 14px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
    }
    .filter-row select option { background: #cc0000; color: #fff; }
    .filter-row button {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-row button:hover { background: rgba(0,0,0,0.2); }

    /* Main content */
    .container {
      max-width: 1120px;
      margin: 32px auto;
      padding: 0 24px;
    }
    .status-bar {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
    }

    /* Book grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 20px;
    }

    /* Book card */
    .card {
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      transition: transform 0.18s, box-shadow 0.18s;
      border-top: 3px solid #cc0000;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    /* Cover colours per category */
    .cover {
      height: 170px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      text-align: center;
      font-family: 'Merriweather', serif;
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.35;
    }
    .cover .cover-author {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      margin-top: 6px;
      opacity: 0.8;
    }
    .cat-CAT001 { background: #2e1f4a; color: #d4b8f0; }
    .cat-CAT002 { background: #0d2e45; color: #82cce8; }
    .cat-CAT003 { background: #3a1e08; color: #e8c87a; }
    .cat-CAT004 { background: #1a3d1a; color: #a8e08c; }
    .cat-CAT005 { background: #0d1f2d; color: #7fc8a8; }
    .cat-default { background: #2a2a2a; color: #e0d0b8; }

    .card-body { padding: 12px 14px 14px; }
    .card-cat  { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: #b08840; font-weight: 600; margin-bottom: 4px; }
    .card-title { font-family: 'Merriweather', serif; font-size: 0.88rem; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
    .card-author { font-size: 0.78rem; color: #7a7060; margin-bottom: 10px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .price { font-weight: 600; font-size: 0.95rem; color: #b03020; }
    .badge { font-size: 0.68rem; padding: 3px 8px; border-radius: 12px; font-weight: 500; }
    .in-stock     { background: #e6f4ea; color: #2d7a3a; }
    .out-of-stock { background: #fdecea; color: #a02020; }

    
    .empty { text-align: center; padding: 64px 16px; color: #a09080; }
    .empty span { font-size: 2.5rem; display: block; margin-bottom: 12px; }
    .empty p { font-size: 0.95rem; }
  </style>
</head>
<body>

<header>
  <h1>🏪 The Book Haven</h1>
  <!-- Shows login or account link based on the customer session -->
  {% if session.customer_name %}
    <a href="/account" style="margin-left:auto;color:#fff;text-decoration:none;font-size:0.88rem;font-weight:500;padding:7px 16px;border:1px solid rgba(255,255,255,0.4);border-radius:4px;">👤 {{ session.customer_name }}</a>
  {% else %}
    <a href="/login" style="margin-left:auto;color:#fff;text-decoration:none;font-size:0.88rem;font-weight:500;padding:7px 16px;border:1px solid rgba(255,255,255,0.4);border-radius:4px;">Login</a>
  {% endif %}

</header>

<div class="hero">
  <h2>Browse Our Catalogue</h2>
  <p>Search by title, author, or ISBN</p>
  <div class="search-row">
    <input type="text" id="search-input" placeholder="e.g. To Kill a Mockingbird">
    <button onclick="doSearch()">Search</button>
  </div>
  <div class="filter-row">
    <select id="category-select" onchange="doSearch()">
      <option value="">All Categories</option>
      {% for cat in categories %}
      <option value="{{ cat.category_id }}">{{ cat.name }}</option>
      {% endfor %}
    </select>
    <button onclick="clearSearch()">Clear</button>
  </div>
</div>

<div class="container">
  <div class="status-bar" id="status"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
  const COVER_CLASS = {
    CAT001: 'cat-CAT001', CAT002: 'cat-CAT002', CAT003: 'cat-CAT003',
    CAT004: 'cat-CAT004', CAT005: 'cat-CAT005'
  };

  function doSearch() {
    const q   = document.getElementById('search-input').value.trim();
    const cat = document.getElementById('category-select').value;
    const params = new URLSearchParams();
    if (q)   params.set('q', q);
    if (cat) params.set('category', cat);
    fetch('/search?' + params).then(r => r.json()).then(books => render(books, q));
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('category-select').value = '';
    doSearch();
  }

  function render(books, query) {
    document.getElementById('status').textContent = query
      ? `${books.length} results for "${query}"`
      : `${books.length} books in catalogue`;

    if (!books.length) {
      document.getElementById('grid').innerHTML =
        `<div class="empty"><span></span><p>No books found. Try a different search.</p></div>`;
      return;
    }

    document.getElementById('grid').innerHTML = books.map(b => `
      <a class="card" href="/book/${b.book_id}">
        <div class="cover ${COVER_CLASS[b.category_id] || 'cat-default'}">
          ${b.title}
          <div class="cover-author">${b.author}</div>
        </div>
        <div class="card-body">
          <div class="card-cat">${b.category_name}</div>
          <div class="card-title">${b.title}</div>
          <div class="card-author">${b.author}</div>
          <div class="card-footer">
            <span class="price">$${b.price.toFixed(2)}</span>
            <span class="badge ${b.in_stock ? 'in-stock' : 'out-of-stock'}">
              ${b.in_stock ? 'In stock' : 'Out of stock'}
            </span>
          </div>
        </div>
      </a>`).join('');
  }

  doSearch();
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
</script>

</body>
</html>
